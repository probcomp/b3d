# This is the b3d project configuration.
#
# https://pixi.sh/latest/reference/project_configuration/
#
# - 'pixi info' for the list of environments, features, and dependnencies.
# - 'pixi list' for the list of dependencies
# - 'pixi tree' for the tree view of dependencies
# - 'pixi task list' for the list of tasks you can run

[project]
name = "b3d"
dynamic = ["version"]
description = "A 3D computer vision library"
license = { text = "Apache 2.0" }
authors = [{ name = "Nishad Gothoskar", email = "nishadg@mit.edu" }]
requires-python = ">= 3.10"
dependencies = []

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.pixi.project]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[tool.pixi.pypi-options]
index-url = "https://pypi.org/simple"
extra-index-urls = [
    "https://oauth2accesstoken@us-west1-python.pkg.dev/probcomp-caliban/probcomp/simple",
]

# Environments

[tool.pixi.environments]
cpu = { features = ["cpu", "dev", "genjax"], solve-group = "default" }
gpu = { features = ["cuda", "dev", "genjax"], solve-group = "cuda" }
cuda = { features = ["cuda"], solve-group = "cuda" }

[tool.pixi.tasks.b3d-install]
description = "Install b3d"
cmd = "install.sh"
cwd = "install"

# Default pypi packages

[tool.pixi.pypi-dependencies]
b3d = { path = ".", editable = true }
opencv-python = ">=4.10.0.84,<4.10.1"
pykitti = "==0.3.1"
pyliblzfse = ">=0.4.1,<0.5"
pyransac3d = ">=0.6.0,<0.7"

# Default conda pacakges

[tool.pixi.dependencies]
distinctipy = ">=1.3.4,<1.4"
imageio = "*"
jupyter = ">=1.0.0,<1.1"
matplotlib = ">=3.9.1,<3.10"
natsort = ">=8.4.0,<8.5"
numpy = "<2.0.0"
trimesh = "==4.2.4"
tqdm = "==4.66.2"
pdoc3 = ">=0.11.1,<0.12"
pillow = "==10.3.0"
polars = ">=0.20,<0.21"
scikit-learn = ">=1.5.1,<1.6"
scipy = ">=1.14.0,<1.15"
ffmpeg = "*"
fire = ">=0.6.0,<0.7"
ipython = ">=8.26.0,<8.27"
optax = ">=0.2.2,<0.3"

# Private GenJAX package

[tool.pixi.feature.genjax.pypi-dependencies]
genjax = "==0.5.1"

# Tasks for Google Cloud Platform (GCP)

[tool.pixi.tasks.gcp-help]
description = "Help with GCP tasks"
cmd = "./gcp.sh :gcp-help"
cwd = "scripts"

[tool.pixi.tasks.gcp-env]
description = "Show GCP environment variables"
cmd = "./gcp.sh :gcp-env"
cwd = "scripts"

[tool.pixi.tasks.gcp-list]
description = "List all VMs"
cmd = "./gcp.sh :gcp-list"
cwd = "scripts"

[tool.pixi.tasks.gcp-code]
description = "Connect to new or existing VM through vscode (requires GCP_VM)"
cmd = "./gcp.sh :gcp-connect-vscode"
cwd = "scripts"
depends_on = ["dev-rerun"]

[tool.pixi.tasks.gcp-terminal]
description = "Connect to new or existing VM through terminal (requires GCP_VM)"
cmd = "./gcp.sh :gcp-connect-terminal"
cwd = "scripts"
depends_on = ["dev-rerun"]

[tool.pixi.tasks.gcp-start]
description = "Start VM (requires GCP_VM)"
cmd = "./gcp.sh :gcp-start"
cwd = "scripts"

[tool.pixi.tasks.gcp-status]
description = "VM status (requires GCP_VM)"
cmd = "./gcp.sh :gcp-status"
cwd = "scripts"

[tool.pixi.tasks.gcp-stop]
description = "Stop VM (requires GCP_VM)"
cmd = "./gcp.sh :gcp-stop"
cwd = "scripts"

[tool.pixi.tasks.gcp-delete]
description = "Delete VM (requires GCP_VM)"
cmd = "./gcp.sh :gcp-delete"
cwd = "scripts"

# Tasks for development

[tool.pixi.feature.dev.tasks.dev-data-sync]
description = "Sync test data"
cmd = "python b3d_pull.py -ow"
cwd = "src/b3d/bucket_utils"

[tool.pixi.feature.dev.tasks.dev-tests]
description = "Execute tests"
cmd = "./scripts/task-tests.sh"
depends_on = ["dev-data-sync", "dev-rerun"]

[tool.pixi.tasks.dev-rerun]
description = "Launch rerun"
cmd = "./task-rerun.sh"
cwd = "scripts"

[tool.pixi.feature.dev.tasks.dev-jupyter]
description = "Launch Jupyter"
cmd = [
    "pixi",
    "run",
    "jupyter",
    "lab",
    "--ip=0.0.0.0",
    "--allow-root",
    "notebooks",
]
depends_on = ["dev-data-sync", "dev-rerun"]

# CPU feature

[tool.pixi.feature.cpu.target.osx-arm64.dependencies]
jax = "*"
jaxlib = { version = "*", build = "cpu*" }
pytorch = { version = "==2.3.0", build = "cpu_generic*" }
torchvision = { version = "*", build = "cpu*" }

[tool.pixi.feature.cpu.target.linux-64.dependencies]
jax = "*"
jaxlib = { version = "*", build = "cpu*" }
pytorch = { version = "==2.3.0", build = "cpu_generic*" }
torchvision = { version = "*", build = "cpu*" }

# Dev feature

[tool.pixi.feature.dev.dependencies]
ninja = "*"
rerun-sdk = "==0.16.1"
ruff = "*"
pytest = "*"
jupyterlab = "*"
pyright = "*"
jupytext = "*"
ipykernel = "*"

# CUDA feature

[tool.pixi.feature.cuda]
platforms = ["linux-64"]
system-requirements = { cuda = "12" }

[tool.pixi.activation.env]
XLA_PYTHON_CLIENT_PREALLOCATE = "false"
XLA_PYTHON_CLIENT_ALLOCATOR = "platform"
CPLUS_INCLUDE_PATH = "$CONDA_PREFIX/targets/x86_64-linux/include"

[tool.pixi.feature.cuda.target.linux-64.dependencies]
cuda-toolkit = "*"
glfw = "*"
gcc = "*"
jax = "*"
jaxlib = { version = "0.4.28", build = "cuda12*" }
libglib = "*"
libglu = "*"
libglvnd-devel-cos7-x86_64 = ">=1.0.1,<1.1"
libglvnd-cos7-x86_64 = ">=1.0.1,<1.1"
libnvjitlink = "*"
mesalib = "*"
mesa-libegl-devel-cos7-x86_64 = "*"
mesa-libegl-cos7-x86_64 = "*"
mesa-libglu-devel-cos7-x86_64 = "*"
mesa-libglu-cos7-x86_64 = "*"
pytorch = { version = "==2.3.0", build = "cuda12*" }
torchvision = "*"

# Platform-specific build dependencies

[tool.pixi.target.osx-arm64.build-dependencies]
scipy = "1.14.0.*"
numpy = "1.26.4.*"

# Pytest config

[tool.pytest.ini_options]
pythonpath = ["src"]

# Ruff config

[tool.ruff.lint]
preview = true
extend-select = ["I"]
select = ["E4", "E7", "E9", "F"]
ignore = ["F403"] # disables "*" import errors
fixable = ["ALL"]
unfixable = []
